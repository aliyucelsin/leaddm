  .convo.unread::before { background: var(--unread); }
  .convo.sel::before { background: var(--brand); }
  .convo.unread:not(.sel) { background: var(--unread-bg); }
  .convo.unread .convo-name { font-weight: 800; color: var(--ink); }
  .convo.unread .convo-preview { color: var(--ink); font-weight: 600; }
  .unread-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--unread); margin-left: 6px; flex: 0 0 auto; box-shadow: 0 0 0 0 rgba(45,127,249,.5); animation: unreadPulse 1.7s infinite; }
  @keyframes unreadPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(45,127,249,.5); } 50% { box-shadow: 0 0 0 5px rgba(45,127,249,0); } }
  .tag.turn-new { background: var(--unread-bg); color: var(--unread); border-color: transparent; font-weight: 800; }
  .tag.turn-me { background: var(--amber-bg); color: var(--amber); border-color: #F1E1B4; }
  .tag.turn-them { background: #EEF2F2; color: #7C9196; border-color: #E1E9E8; }
  .chip.reply.active { background: var(--amber); border-color: var(--amber); color: #4A3600; }
  [data-theme="dark"] .tag.turn-me { border-color: #4A3E1A; }
  [data-theme="dark"] .tag.turn-them { background: #1B2A2F; color: #8AA0A4; border-color: #26393E; }
  [data-theme="dark"] .chip.reply.active { color: #16110A; }

  /* bekleme süresi rengi */
  .convo-time.wait { color: var(--amber); font-weight: 700; }
  .convo-time.wait-long { color: var(--rose); font-weight: 800; }

  /* composer araçları */
  .compose-tools { display: flex; gap: 8px; padding: 9px 18px 0; }
  .ctool { display: inline-flex; align-items: center; gap: 6px; padding: 7px 13px; border-radius: 10px; border: 1px solid var(--line); background: var(--paper); color: var(--ink2); font-weight: 650; font-size: 12.5px; transition: background .13s, border-color .13s; }
  .ctool:hover { background: var(--panel); border-color: var(--brand-100); }
  .ctool.ai { background: linear-gradient(135deg,#EDE9FE,#F3E8FF); color: #5B44C7; border-color: #D8CFF7; }
  [data-theme="dark"] .ctool.ai { background: #241E3D; color: #B7A6F5; border-color: #3A2E63; }

  /* hazır yanıt menüsü */
  .tpl-menu { position: fixed; z-index: 95; width: 340px; max-height: 62vh; overflow-y: auto; background: var(--paper); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow-lg); padding: 6px; animation: pop .12s ease-out; }
  .tpl-head { font-size: 11px; font-weight: 800; letter-spacing: .4px; color: var(--ink3); padding: 8px 10px 6px; }
  .tpl-item { display: block; width: 100%; text-align: left; border: none; background: none; padding: 9px 10px; border-radius: 9px; cursor: pointer; }
  .tpl-item:hover { background: var(--panel); }
  .tpl-t { display: block; font-weight: 700; font-size: 13px; color: var(--brand-d); margin-bottom: 2px; }
  .tpl-m { display: block; font-size: 12.5px; color: var(--ink2); line-height: 1.4; }
  .tpl-head { display:flex; align-items:center; justify-content:space-between; }
  .tpl-manage { border:1px solid var(--brand-100); background:var(--brand-050); color:var(--brand-d); font-weight:800; font-size:11px; padding:3px 8px; border-radius:8px; cursor:pointer; letter-spacing:0; }
  .ctool.gal { background: linear-gradient(135deg,#FEF3C7,#FDE68A); color:#92670A; border-color:#F5D98B; }
  [data-theme="dark"] .ctool.gal { background:#3A2E12; color:#E8C874; border-color:#5A4718; }

  /* hazır yanıt yönetimi */
  .tplm-body { padding: 16px 20px 22px; overflow-y:auto; }
  .tplm-form { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
  .tplm-form input, .tplm-form textarea { width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid var(--line); border-radius:10px; background:var(--paper); color:var(--ink); font-size:14px; font-family:inherit; outline:none; }
  .tplm-form input:focus, .tplm-form textarea:focus { border-color:var(--brand); }
  .tplm-addbtn { align-self:flex-start; padding:9px 16px; border:0; border-radius:10px; background:var(--brand); color:#fff; font-weight:700; font-size:14px; cursor:pointer; }
  .tplm-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--line); border-radius:10px; margin-bottom:8px; }
  .tplm-txt { flex:1; min-width:0; }
  .tplm-txt b { display:block; font-size:13px; color:var(--brand-d); }
  .tplm-txt span { display:block; font-size:12px; color:var(--ink2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tplm-del { border:1px solid #F0C4C4; background:#FDECEC; color:#C0392B; font-weight:700; font-size:12px; padding:6px 12px; border-radius:8px; cursor:pointer; }
  [data-theme="dark"] .tplm-del { background:#3A1E1E; border-color:#5A2A2A; color:#F08A8A; }
  .ar-rowbtns, .ar-editbtns { display:flex; flex-direction:column; gap:6px; flex:0 0 auto; }
  .ar-edit { border:1px solid var(--brand-100); background:var(--brand-050); color:var(--brand-d); font-weight:700; font-size:12px; padding:6px 12px; border-radius:8px; cursor:pointer; }
  .tplm-row.ar-editing { align-items:stretch; flex-direction:column; }
  .ar-ekw, .ar-erp { width:100%; box-sizing:border-box; padding:9px 11px; border:1px solid var(--line); border-radius:9px; background:var(--paper); color:var(--ink); font-size:13px; outline:none; }
  .ar-ekw:focus, .ar-erp:focus { border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-050); }
  .ar-erp { margin-top:6px; resize:vertical; line-height:1.5; }
  .tplm-row.ar-editing .ar-editbtns { flex-direction:row; margin-top:8px; }
  .ar-cancel { border:1px solid var(--line); background:var(--panel); color:var(--ink2); font-weight:700; font-size:12px; padding:6px 14px; border-radius:8px; cursor:pointer; }

  /* analitik ek */
  .an-load { font-size:12.5px; color:var(--ink3); padding:10px 0; }
  .an-note { font-size:12.5px; color:var(--ink2); line-height:1.5; }
  .an-note b { color:var(--brand-d); }

  /* galeri */
  .gal-body { padding:16px 20px 22px; overflow-y:auto; }
  .gal-up { display:flex; align-items:center; justify-content:center; padding:16px; border:2px dashed var(--brand-100); border-radius:12px; color:var(--brand-d); font-weight:700; font-size:14px; cursor:pointer; margin-bottom:16px; background:var(--brand-050); }
  .gal-up:hover { background:var(--brand-100); }
  .gal-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:12px; }
  .gal-item { border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--panel); }
  .gal-item img { width:100%; height:110px; object-fit:cover; display:block; }
  .gal-pdf { width:100%; height:110px; display:grid; place-items:center; font-weight:800; color:#C0392B; background:#FDECEC; font-size:18px; letter-spacing:1px; }
  .gal-acts { display:flex; gap:6px; padding:8px; }
  .gal-send { flex:1; border:0; border-radius:8px; background:var(--brand); color:#fff; font-weight:700; font-size:12.5px; padding:7px; cursor:pointer; }
  .gal-del { border:1px solid var(--line); background:var(--paper); color:var(--ink3); border-radius:8px; padding:7px 10px; cursor:pointer; font-weight:700; }

  /* sohbette görsel/dosya balonu */
  .bubble-img { max-width:220px; width:100%; border-radius:10px; display:block; margin-bottom:4px; }
  .bubble-file { color:inherit; text-decoration:underline; word-break:break-all; }
  .bubble-audiowrap { display:flex; align-items:center; gap:7px; margin-bottom:3px; font-size:13px; }
  .bubble-audio { height:36px; width:210px; max-width:100%; }
  .bubble-vid { max-width:240px; width:100%; border-radius:10px; display:block; margin-bottom:4px; }
  .ctool.rec.recording { background:#E0475A; color:#fff; border-color:#E0475A; animation:recPulse 1.1s infinite; }
  @keyframes recPulse { 0%,100%{ box-shadow:0 0 0 0 rgba(224,71,90,.5);} 50%{ box-shadow:0 0 0 6px rgba(224,71,90,0);} }
  .cta-ig { display:inline-flex; align-items:center; gap:6px; padding:5px 11px; margin:0 0 10px; border-radius:20px; text-decoration:none; font-weight:700; font-size:11.5px; color:#fff; background:linear-gradient(135deg,#833AB4,#E1306C 55%,#F77737); }
  .cta-ig:hover { filter:brightness(1.06); }
  .cta-ig svg { flex:0 0 auto; }

  /* otomatik karşılama ayarları */
  .wel-body { padding:18px 20px 22px; overflow-y:auto; }
  .wel-toggle { display:flex; align-items:center; gap:10px; cursor:pointer; margin-bottom:14px; }
  .wel-toggle input { position:absolute; opacity:0; width:0; height:0; }
  .wel-sw { width:44px; height:25px; border-radius:20px; background:var(--line); position:relative; transition:background .18s; flex:0 0 auto; }
  .wel-sw::after { content:''; position:absolute; top:3px; left:3px; width:19px; height:19px; border-radius:50%; background:#fff; transition:left .18s; box-shadow:0 1px 3px rgba(0,0,0,.3); }
  .wel-toggle input:checked + .wel-sw { background:var(--brand); }
  .wel-toggle input:checked + .wel-sw::after { left:22px; }
  .wel-lab { font-weight:700; font-size:14px; color:var(--ink); }
  .wel-hint { font-size:12.5px; color:var(--ink2); line-height:1.55; margin-bottom:12px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:11px 13px; }
  .wel-hint b { color:var(--brand-d); }
  #welMsg { width:100%; box-sizing:border-box; padding:12px 14px; border:1px solid var(--line); border-radius:10px; background:var(--paper); color:var(--ink); font-size:14px; font-family:inherit; line-height:1.5; outline:none; resize:vertical; margin-bottom:12px; }
  #welMsg:focus { border-color:var(--brand); }

  /* yanıt bekliyor kartı + acil yanıp sönme */
  .sum-card.wait .sc-bar { background: var(--amber); }
  .sum-card.wait .sc-n { color: #B4820A; }
  .sum-card.wait .sc-dot { background: var(--amber); }
  .sum-card.pulse-wait { border-color: var(--amber); }
  .sum-card.pulse-wait .sc-dot { animation: dotPulse 1.2s ease-in-out infinite; }
  .sum-card.call .sc-bar { background: var(--brand); }
  .sum-card.call .sc-n { color: var(--brand-d); }
  .convo.urgent-reply { animation: urgentBlink 1.7s ease-in-out infinite; }
  .convo.urgent-reply::before { background: var(--rose) !important; }
  @keyframes urgentBlink { 0%,100%{ background: transparent; } 50%{ background: rgba(224,71,90,.10); } }

  /* bugün aranacaklar */
  .call-body { padding: 12px 16px 20px; overflow-y:auto; }
  .call-row { display:flex; align-items:center; gap:12px; padding:10px 12px; border:1px solid var(--line); border-radius:12px; margin-bottom:8px; }
  .call-main { flex:1; min-width:0; }
  .call-name { font-weight:700; font-size:14px; color:var(--ink); }
  .call-sub { font-size:12px; color:var(--ink2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .call-phone { font-weight:700; font-size:13.5px; color:var(--brand-d); font-variant-numeric:tabular-nums; flex:0 0 auto; }
  .call-acts { display:flex; gap:6px; flex:0 0 auto; }
  .call-btn { border:1px solid var(--line); background:var(--paper); color:var(--ink2); border-radius:9px; padding:8px 11px; font-weight:700; font-size:12.5px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; white-space:nowrap; }
  .call-btn.tel { background:var(--brand); color:#fff; border-color:var(--brand); }
  .call-btn.wa { background:#25D366; color:#fff; border-color:#25D366; }
  @media (max-width:680px){ .call-phone { display:none; } .call-sub { max-width:110px; } .call-btn { padding:8px 9px; } }

  /* şifre değiştir inputları */
  .pass-inp { width:100%; box-sizing:border-box; padding:12px 14px; margin-bottom:9px; border:1px solid var(--line); border-radius:10px; background:var(--paper); color:var(--ink); font-size:15px; outline:none; }
  .pass-inp:focus { border-color:var(--brand); }

  /* KVKK */
  .kvkk-btn { width:100%; padding:11px; border:1.5px solid var(--line); border-radius:11px; background:var(--paper); color:var(--ink2); font-weight:700; font-size:13px; cursor:pointer; transition:background .14s,border-color .14s; }
  .kvkk-btn:hover { border-color:var(--brand-100); }
  .kvkk-btn.on { background:var(--emerald-bg,#E7F7EF); border-color:#B7E6CE; color:#0A7A54; }
  [data-theme="dark"] .kvkk-btn.on { background:#12321F; border-color:#1E4A3B; color:#7FE0AD; }
  .kvkk-hint { font-size:11.5px; color:var(--ink3); margin-top:7px; line-height:1.5; }
  .tag.kvkk-ok { background:var(--emerald-bg,#E7F7EF); color:#0A7A54; border-color:#C4EAD8; }
  .tag.kvkk-no { background:#FFF4E5; color:#B4820A; border-color:#F5E0B8; }
  [data-theme="dark"] .tag.kvkk-ok { background:#12321F; color:#7FE0AD; border-color:#1E4A3B; }
  [data-theme="dark"] .tag.kvkk-no { background:#3A2E12; color:#E8C874; border-color:#5A4718; }

  /* mesai saatleri */
  #ohMsg { width:100%; box-sizing:border-box; padding:12px 14px; border:1px solid var(--line); border-radius:10px; background:var(--paper); color:var(--ink); font-size:14px; font-family:inherit; line-height:1.5; outline:none; resize:vertical; margin-bottom:12px; }
  #ohMsg:focus { border-color:var(--brand); }
  .hours-row { display:flex; gap:12px; margin-bottom:12px; }
  .hours-f { flex:1; }
  .hours-f label { display:block; font-size:12px; color:var(--ink2); margin-bottom:4px; font-weight:600; }
  .hours-f input { width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid var(--line); border-radius:10px; background:var(--paper); color:var(--ink); font-size:15px; outline:none; }
  .hours-f input:focus { border-color:var(--brand); }
  .hours-lab { font-size:12px; color:var(--ink2); font-weight:600; margin-bottom:6px; }
  .hours-days { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .daychip { cursor:pointer; }
  .daychip input { position:absolute; opacity:0; width:0; height:0; }
  .daychip span { display:inline-block; padding:8px 12px; border:1.5px solid var(--line); border-radius:9px; font-weight:700; font-size:12.5px; color:var(--ink2); }
  .daychip input:checked + span { background:var(--brand); color:#fff; border-color:var(--brand); }

  /* lead skoru */
  .score-box { margin-bottom: 18px; padding: 14px; border-radius: 14px; border: 1px solid var(--line); background: var(--panel); }
  .score-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; }
  .score-lbl { font-size: 12.5px; font-weight: 700; color: var(--ink2); }
  .score-val { font-size: 23px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .score-val small { font-size: 12px; color: var(--ink3); font-weight: 600; }
  .score-bar { height: 8px; border-radius: 6px; background: var(--line2); overflow: hidden; }
  .score-bar span { display: block; height: 100%; border-radius: 6px; transition: width .6s var(--ease-out); }
  .score-tag { margin-top: 9px; font-size: 12px; font-weight: 700; display: inline-block; padding: 3px 11px; border-radius: 999px; }
  .score-box.hot .score-val, .score-box.hot .score-tag { color: #C6395A; }
  .score-box.hot .score-bar span { background: linear-gradient(90deg,#F0708A,#C6395A); }
  .score-box.hot .score-tag { background: var(--rose-bg); }
  .score-box.warm .score-val, .score-box.warm .score-tag { color: var(--amber); }
  .score-box.warm .score-bar span { background: linear-gradient(90deg,#E4B657,#B4820A); }
  .score-box.warm .score-tag { background: var(--amber-bg); }
  .score-box.cold .score-val, .score-box.cold .score-tag { color: var(--ink3); }
  .score-box.cold .score-bar span { background: linear-gradient(90deg,#9FB3B4,#6E8388); }
  .score-box.cold .score-tag { background: var(--line2); }

  /* takip planı */
  .nurture { display: flex; flex-direction: column; gap: 6px; }
  .nstep { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; border: 1px solid var(--line); background: var(--paper); text-align: left; cursor: pointer; transition: background .12s; }
  .nstep:hover { background: var(--panel); }
  .nstep .nic { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; font-size: 12px; font-weight: 800; flex: 0 0 auto; background: var(--line2); color: var(--ink3); }
  .nstep .ntxt { flex: 1; font-size: 13px; font-weight: 600; }
  .nstep .ndate { font-size: 11.5px; color: var(--ink3); }
  .nstep.done .nic { background: var(--emerald); color: #fff; }
  .nstep.done .ntxt { text-decoration: line-through; color: var(--ink3); }
  .nstep.today .nic { background: var(--amber); color: #fff; }
  .nstep.today { border-color: var(--amber); }
  .nstep.missed .nic { background: var(--rose); color: #fff; }
  .nstep.missed { border-color: #F0C4CA; }
  [data-theme="dark"] .nstep.missed { border-color: #4E2830; }
  .nurture-hint { margin-top: 8px; font-size: 11px; color: var(--ink3); }

  /* dosyalar */
  .files { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .file-thumb { position: relative; width: 58px; height: 58px; border-radius: 10px; overflow: hidden; border: 1px solid var(--line); background: var(--panel); display: grid; place-items: center; }
  .file-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .file-ic { font-size: 9px; font-weight: 700; color: var(--ink3); }
  .file-x { position: absolute; top: -6px; right: -6px; width: 19px; height: 19px; border-radius: 50%; border: 2px solid var(--paper); background: var(--rose); color: #fff; font-size: 13px; line-height: 1; cursor: pointer; padding: 0; }
  .file-add { display: inline-flex; align-items: center; gap: 6px; padding: 9px 14px; border-radius: 10px; border: 1px dashed var(--line); background: var(--panel); color: var(--brand-d); font-weight: 650; font-size: 13px; cursor: pointer; }
  .file-add:hover { background: var(--brand-050); }

  /* analitik */
  .board.analytics { max-width: 940px; }
  .an-tiles { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; padding: 18px 22px; }
  .an-tile { border: 1px solid var(--line); border-radius: 14px; padding: 14px; background: var(--panel); }
  .an-tile .at-n { font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -.5px; }
  .an-tile .at-l { font-size: 12px; color: var(--ink2); font-weight: 600; margin-top: 3px; }
  .an-tile.ok .at-n { color: var(--emerald); }
  .an-tile.no .at-n { color: var(--rose); }
  .an-tile.rv .at-n { color: var(--brand-d); }
  .an-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 0 22px 22px; }
  .an-card { border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; background: var(--paper); }
  .an-h { font-size: 12.5px; font-weight: 700; color: var(--ink2); margin-bottom: 13px; }
  .an-bars { display: flex; flex-direction: column; gap: 9px; }
  .an-row { display: flex; align-items: center; gap: 10px; }
  .an-lab { width: 40%; font-size: 12px; color: var(--ink2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .an-track { flex: 1; height: 9px; border-radius: 6px; background: var(--line2); overflow: hidden; }
  .an-fill { display: block; height: 100%; border-radius: 6px; transition: width .6s var(--ease-out); }
  .an-n { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; width: 22px; text-align: right; color: var(--ink); }
  .an-trend { display: flex; align-items: flex-end; gap: 8px; height: 120px; padding-top: 12px; }
  .an-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; gap: 5px; }
  .an-coln { font-size: 11px; font-weight: 700; color: var(--ink2); font-variant-numeric: tabular-nums; }
  .an-bar { width: 100%; max-width: 34px; border-radius: 6px 6px 0 0; background: linear-gradient(180deg,#13A6B1,#0A6D75); transition: height .6s var(--ease-out); }
  .an-coll { font-size: 11px; color: var(--ink3); }
  .an-empty { font-size: 12.5px; color: var(--ink3); padding: 8px 0; }
  @media (max-width: 760px) { .an-tiles { grid-template-columns: 1fr 1fr; } .an-grid { grid-template-columns: 1fr; } }

  /* etiketler & temsilci */
  .tag.lead-tag { background: #EEF2F2; color: #5B7075; border-color: #E1E9E8; cursor: pointer; }
  .tag.lead-tag:hover { background: var(--brand-050); color: var(--brand-d); }
  [data-theme="dark"] .tag.lead-tag { background: #1E2F34; color: #A2B6B7; border-color: #2A3B40; }
  .tag.tem-chip { color: #fff; background: var(--tc,#0C8A94); border-color: transparent; font-weight: 700; }
  .tagfilter-bar { display: flex; align-items: center; gap: 8px; padding: 9px 14px; background: var(--brand-050); border-bottom: 1px solid var(--line2); font-size: 12.5px; color: var(--brand-d); }
  .tagfilter-bar b { font-weight: 800; }
  .tagfilter-bar button { margin-left: auto; border: none; background: none; color: var(--ink3); cursor: pointer; font-size: 15px; line-height: 1; }
  .ctags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .ctag { display: inline-flex; align-items: center; gap: 5px; padding: 4px 8px 4px 11px; border-radius: 999px; background: var(--brand-050); color: var(--brand-d); font-size: 12px; font-weight: 600; }
  .ctag button { border: none; background: none; color: var(--brand-d); cursor: pointer; font-size: 14px; line-height: 1; opacity: .7; padding: 0; }
  .ctag button:hover { opacity: 1; }
  .ctags-empty { font-size: 12px; color: var(--ink3); }
  .tagsugs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .tagsug { padding: 4px 11px; border-radius: 999px; border: 1px dashed var(--line); background: none; color: var(--ink2); font-size: 12px; font-weight: 600; cursor: pointer; }
  .tagsug:hover { border-color: var(--brand-100); color: var(--brand-d); background: var(--brand-050); }

  /* randevu */
  .randevu-info { margin-top: 9px; font-size: 13px; font-weight: 700; color: var(--brand-d); }
  .randevu-hint { margin-top: 9px; font-size: 12px; color: var(--ink3); }
  .cta-wa.alt { margin-top: 11px; margin-bottom: 0; font-size: 13px; padding: 11px; }

  /* kanban */
  .board.kanban { max-width: 1200px; width: 100%; }
  .kb-board { display: flex; gap: 12px; padding: 16px 20px 22px; overflow-x: auto; }
  .kb-col { flex: 0 0 244px; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; display: flex; flex-direction: column; max-height: 62vh; transition: border-color .12s, box-shadow .12s; }
  .kb-col.over { border-color: var(--brand); box-shadow: 0 0 0 2px var(--brand-100) inset; }
  .kb-head { padding: 11px 13px; font-weight: 700; font-size: 12.5px; border-bottom: 1px solid var(--line2); display: flex; align-items: center; gap: 7px; }
  .kb-hdot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
  .kb-cnt { margin-left: auto; font-size: 11px; font-weight: 800; color: var(--ink3); background: var(--line2); padding: 1px 8px; border-radius: 999px; }
  .kb-list { padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; min-height: 44px; }
  .kb-card { background: var(--paper); border: 1px solid var(--line); border-radius: 11px; padding: 10px 11px; cursor: grab; box-shadow: var(--shadow-sm); transition: box-shadow .12s, transform .1s; }
  .kb-card:hover { box-shadow: var(--shadow-md); }
  .kb-card:active { cursor: grabbing; }
  .kb-card.dragging { opacity: .4; }
  .kb-name { font-weight: 700; font-size: 13.5px; display: flex; align-items: center; gap: 6px; }
  .kb-dot { width: 8px; height: 8px; border-radius: 50%; margin-left: auto; flex: 0 0 auto; }
  .kb-dot.hot { background: #C6395A; } .kb-dot.warm { background: var(--amber); } .kb-dot.cold { background: var(--ink3); }
  .kb-sub { font-size: 12px; color: var(--ink3); margin-top: 3px; }
  .kb-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
  .kb-empty { color: var(--ink3); font-size: 12px; text-align: center; padding: 10px; }

  /* takvim (ajanda) */
  .board.takvim { max-width: 640px; }
  .tk-body { padding: 16px 22px 22px; max-height: 70vh; overflow-y: auto; }
  .tk-group { margin-bottom: 16px; }
  .tk-day { font-size: 11.5px; font-weight: 800; letter-spacing: .3px; color: var(--brand-d); text-transform: uppercase; margin-bottom: 9px; }
  .tk-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 12px; margin-bottom: 8px; }
  .tk-time { font-weight: 800; font-variant-numeric: tabular-nums; color: var(--ink); font-size: 14px; flex: 0 0 auto; width: 52px; }
  .tk-main { flex: 1; text-align: left; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
  .tk-name { font-weight: 650; font-size: 14px; }
  .tk-islem { font-size: 12px; color: var(--ink3); }
  .tk-wa { width: 40px; height: 40px; border-radius: 10px; background: #25D366; color: #fff; display: grid; place-items: center; flex: 0 0 auto; }
  .tk-wa svg { width: 19px; height: 19px; }
  .tk-empty { padding: 30px 20px; text-align: center; color: var(--ink3); font-size: 13px; line-height: 1.5; }
  @media (max-width: 760px) { .kb-col { flex-basis: 208px; } }

  /* Filtre düğmesi + genel açılır menü + renk açıklaması */
  .filter-toggle { display: inline-flex; align-items: center; gap: 8px; width: 100%; padding: 9px 12px; border-radius: 11px; border: 1px solid var(--line); background: var(--paper); color: var(--ink); font-weight: 650; font-size: 13.5px; cursor: pointer; transition: border-color .13s, background .13s; }
  .filter-toggle:hover { border-color: var(--brand-100); background: var(--panel); }
  .filter-toggle > svg:first-child { width: 16px; height: 16px; color: var(--ink3); flex: 0 0 auto; }
  .filter-toggle .ft-lab { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .filter-toggle .ft-cnt { margin-left: auto; font-variant-numeric: tabular-nums; font-size: 12px; font-weight: 800; color: var(--brand-d); background: var(--brand-050); padding: 1px 9px; border-radius: 999px; flex: 0 0 auto; }
  .filter-toggle .ft-caret { width: 15px; height: 15px; color: var(--ink3); flex: 0 0 auto; }
  .tools-btn { display: inline-flex; align-items: center; gap: 6px; }

  .drop-menu { position: fixed; z-index: 96; background: var(--paper); border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow-lg); padding: 6px; animation: pop .12s ease-out; max-height: 72vh; overflow-y: auto; }
  .dm-item { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 11px; border: none; background: none; border-radius: 9px; font-size: 13.5px; font-weight: 600; color: var(--ink); cursor: pointer; text-align: left; }
  .dm-item:hover { background: var(--panel); }
  .dm-item.on { background: var(--brand-050); color: var(--brand-d); }
  .dm-lab { flex: 1; white-space: nowrap; }
  .dm-cnt { font-variant-numeric: tabular-nums; font-size: 12px; font-weight: 800; color: var(--ink3); background: var(--line2); padding: 1px 8px; border-radius: 999px; }
  .dm-item.on .dm-cnt { color: var(--brand-d); background: var(--brand-100); }

  .list-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; font-size: 11.5px; color: var(--ink3); }
  .list-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .lg-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .lg-dot.new { background: var(--unread); }
  .lg-dot.me { background: var(--amber); }
  .lg-dot.them { background: var(--ink3); }

  /* Panel katlama (açılır/kapanır sekmeler) */
  .pane-toggle { display: none; width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--line); background: var(--paper); color: var(--ink3); align-items: center; justify-content: center; flex: 0 0 auto; transition: background .13s, color .13s, border-color .13s; }
  .pane-toggle svg { width: 18px; height: 18px; }
  .pane-toggle:hover { background: var(--panel); color: var(--ink); }
  @media (min-width: 1081px) {
    .pane-toggle { display: inline-flex; }
    body.list-collapsed .pane.list { display: none; }
    body.contact-collapsed .pane.contact { display: none; }
    body.list-collapsed .body { grid-template-columns: 68px 1fr 340px; }
    body.contact-collapsed .body { grid-template-columns: 68px 340px 1fr; }
    body.list-collapsed.contact-collapsed .body { grid-template-columns: 68px 1fr; }
    body.list-collapsed .pane-toggle[data-toggle="list"],
    body.contact-collapsed .pane-toggle[data-toggle="contact"] { color: var(--brand-d); border-color: var(--brand-100); background: var(--brand-050); }
  }

  /* ---------- Chat pane ---------- */
  .chat-empty { flex: 1; display: grid; place-items: center; text-align: center; color: var(--ink3); }
  .chat-empty .ic { width: 64px; height: 64px; border-radius: 20px; background: var(--brand-050); display: grid; place-items: center; margin: 0 auto 14px; color: var(--brand); }
  .chat-empty .ic svg { width: 30px; height: 30px; }

  .chat-head {
    flex: 0 0 auto; display: flex; align-items: center; gap: 12px;
    padding: 12px 18px; border-bottom: 1px solid var(--line);
  }
  .chat-head .avatar { width: 40px; height: 40px; font-size: 14px; }
  .chat-head .meta { min-width: 0; }
  .chat-head .meta .n { font-weight: 650; font-size: 15px; }
  .chat-head .meta .h { font-size: 12px; color: var(--brand); }
  .chat-head .meta .h a { color: inherit; text-decoration: none; }
  .chat-head .meta .h a:hover { text-decoration: underline; }

  .thread { flex: 1; overflow-y: auto; padding: 22px 18px; background:
      linear-gradient(var(--ground), var(--ground)); background-attachment: local; }
  .day-sep { text-align: center; margin: 6px 0 16px; }
  .day-sep span { font-size: 11px; font-weight: 700; color: var(--ink3); background: var(--paper); padding: 4px 12px; border-radius: 999px; border: 1px solid var(--line); }
  .msg-row { display: flex; margin-bottom: 12px; }
  .msg-row.out { justify-content: flex-end; }
  .bubble {
    max-width: 74%; padding: 10px 14px; border-radius: 16px;
    font-size: 13.5px; line-height: 1.45; box-shadow: var(--shadow-sm);
    position: relative; word-wrap: break-word;
  }
  .msg-row.in .bubble { background: var(--paper); border: 1px solid var(--line); border-bottom-left-radius: 5px; }
  .msg-row.out .bubble { background: linear-gradient(135deg, #12A0AB, var(--brand-d)); color: #fff; border-bottom-right-radius: 5px; }
  .bubble .t { display: block; margin-top: 5px; font-size: 10.5px; opacity: .65; text-align: right; }
  .msg-row.in .bubble .t { color: var(--ink3); opacity: 1; }

  .quickbar {
    flex: 0 0 auto; display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    padding: 9px 18px; border-top: 1px solid var(--line); background: var(--panel);
  }
  .quickbar .lbl { font-size: 11px; font-weight: 700; color: var(--ink3); letter-spacing: .3px; }
  .qbtn {
    padding: 6px 11px; border-radius: 9px; border: 1px solid transparent;
    font-weight: 650; font-size: 12.5px; transition: all .13s;
  }
  .qbtn.ok { background: var(--emerald); color: #fff; }
  .qbtn.ok:hover { background: #0C8C60; }
  .qbtn.brand { background: var(--brand-050); color: var(--brand-d); }
  .qbtn.brand:hover { background: var(--brand-100); }
  .qbtn.warn { background: var(--rose-bg); color: var(--rose); }
  .qbtn.warn:hover { background: #F9D6DB; }
  .qbtn.ghost { background: #EFF4F3; color: var(--ink2); margin-left: auto; }
  .qbtn.ghost:hover { background: #E4ECEB; }

  .composer { flex: 0 0 auto; display: flex; gap: 10px; padding: 12px 18px; border-top: 1px solid var(--line); align-items: flex-end; }
  .composer textarea {
    flex: 1; resize: none; min-height: 44px; max-height: 120px; padding: 11px 14px;
    border-radius: 13px; border: 1px solid var(--line); background: var(--paper); outline: none;
    transition: border-color .15s, box-shadow .15s; line-height: 1.4;
  }
  .composer textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-050); }
  .send {
    flex: 0 0 auto; padding: 12px 20px; border-radius: 13px; border: none;
    background: linear-gradient(135deg, #12A0AB, var(--brand-d)); color: #fff; font-weight: 700;
    box-shadow: 0 4px 12px rgba(12,138,148,.3); transition: transform .1s, box-shadow .15s;
  }
  .send:hover { box-shadow: 0 6px 18px rgba(12,138,148,.42); }
  .send:active { transform: translateY(1px); }

  /* ---------- Contact pane ---------- */
  .contact-scroll { flex: 1; overflow-y: auto; padding: 20px 18px; }
  .contact-empty { flex: 1; display: grid; place-items: center; text-align: center; color: var(--ink3); font-size: 13px; padding: 24px; }
  .c-head { text-align: center; margin-bottom: 18px; }
  .c-head .avatar { width: 64px; height: 64px; font-size: 22px; margin: 0 auto 10px; }
  .c-head .n { font-weight: 700; font-size: 17px; }
  .c-head .src { font-size: 12px; color: var(--ink3); margin-top: 2px; }

  .cta-hot {
    width: 100%; padding: 12px; border-radius: 13px; border: none; margin-bottom: 20px;
    background: var(--emerald); color: #fff; font-weight: 700; font-size: 13.5px;
    box-shadow: 0 5px 16px rgba(14,159,110,.32); transition: transform .1s;
  }
  .cta-hot:hover { background: #0C8C60; }
  .cta-hot:active { transform: translateY(1px); }

  .section { margin-bottom: 18px; }
  .section > .h { font-size: 11px; font-weight: 800; letter-spacing: .6px; color: var(--ink3); text-transform: uppercase; margin-bottom: 9px; }
  .fields { display: flex; flex-direction: column; gap: 9px; }
  .frow { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--ink2); margin-bottom: 3px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 8px 10px; border-radius: 9px; border: 1px solid var(--line);
    background: var(--paper); outline: none; transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-050); }
  .field input.missing { border-color: #F0B8BF; background: #FEF5F6; }

  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .sbtn {
    display: flex; align-items: center; gap: 7px; padding: 8px 9px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--paper); color: var(--ink2);
    font-weight: 600; font-size: 12px; text-align: left; transition: all .12s;
  }
  .sbtn:hover { background: #F2F7F6; }
  .sbtn .sd { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
  .sbtn.on { border-color: var(--brand); background: var(--brand-050); color: var(--brand-d); box-shadow: 0 0 0 1px var(--brand-100) inset; }

  .date-input { width: 100%; padding: 8px 10px; border-radius: 9px; border: 1px solid var(--line); background: var(--paper); outline: none; }
  .date-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-050); }
  .date-quick { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .dq { padding: 5px 10px; border-radius: 999px; border: 1px solid var(--line); background: var(--paper); color: var(--ink2); font-size: 12px; font-weight: 600; transition: all .12s; }
  .dq:hover { border-color: var(--brand-100); background: var(--brand-050); color: var(--brand-d); }
  .due-note { margin-top: 9px; padding: 8px 11px; border-radius: 9px; font-size: 12px; font-weight: 700; }
  .due-note.overdue { background: var(--rose-bg); color: var(--rose); }
  .due-note.today { background: var(--amber-bg); color: var(--amber); }
  .due-note.future { background: #EFF4F3; color: var(--ink2); }

  .del {
    width: 100%; padding: 9px; border-radius: 10px; border: 1px solid #F0C4CA;
    background: var(--paper); color: var(--rose); font-weight: 650; transition: background .12s;
  }
  .del:hover { background: var(--rose-bg); }

  /* ---------- Context menu ---------- */
  .ctx {
    position: fixed; z-index: 90; width: 224px; background: var(--paper);
    border: 1px solid var(--line); border-radius: 13px; box-shadow: var(--shadow-lg);
    padding: 6px; animation: pop .12s ease-out;
  }
  @keyframes pop { from { opacity: 0; transform: scale(.97) translateY(-3px); } to { opacity: 1; transform: none; } }
  .ctx .ctx-head { font-size: 10.5px; font-weight: 800; letter-spacing: .5px; color: var(--ink3); text-transform: uppercase; padding: 7px 10px 6px; }
  .ctx button {
    width: 100%; display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    border: none; background: none; border-radius: 9px; font-weight: 600; font-size: 13px; color: var(--ink); text-align: left;
    transition: background .1s;
  }
  .ctx button:hover { background: #F2F7F6; }
  .ctx button .mi { width: 24px; height: 24px; border-radius: 7px; display: grid; place-items: center; background: #EFF4F3; flex: 0 0 auto; }
  .ctx button .mi svg { width: 14px; height: 14px; }
  .ctx button .desc { margin-left: auto; font-size: 11px; color: var(--ink3); font-weight: 500; }
  .ctx .sep { height: 1px; background: var(--line2); margin: 5px 6px; }
  .ctx button.danger { color: var(--rose); }
  .ctx button.danger .mi { background: var(--rose-bg); color: var(--rose); }
  .ctx button.good .mi { background: var(--emerald-bg); color: var(--emerald); }
  .ctx button.brand .mi { background: var(--brand-050); color: var(--brand-d); }

  /* ---------- Reminders popover ---------- */
  .pop {
    position: fixed; z-index: 85; top: 66px; right: 20px; width: 380px;
    background: var(--paper); border: 1px solid var(--line); border-radius: 16px;
    box-shadow: var(--shadow-lg); overflow: hidden; animation: pop .14s ease-out;
  }
  .pop-head { display: flex; align-items: center; gap: 8px; padding: 14px 16px; border-bottom: 1px solid var(--line2); }
  .pop-head .t { font-weight: 700; font-size: 14px; }
  .pop-head .cnt { font-size: 11px; font-weight: 800; color: #fff; background: var(--rose); padding: 2px 8px; border-radius: 999px; }
  .pop-list { max-height: 380px; overflow-y: auto; }
  .pop-item { display: flex; align-items: center; gap: 11px; padding: 11px 16px; border-bottom: 1px solid var(--line2); width: 100%; background: none; border-left: none; border-right: none; border-top: none; text-align: left; transition: background .1s; }
  .pop-item:hover { background: #F2F7F6; }
  .pop-item .rdot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
  .pop-item .pi-main { min-width: 0; flex: 1; }
  .pop-item .pi-name { font-weight: 650; font-size: 13.5px; }
  .pop-item .pi-sub { font-size: 11.5px; color: var(--ink3); }
  .pop-item .pi-when { font-size: 11.5px; font-weight: 700; flex: 0 0 auto; }
  .pop-empty { padding: 30px 20px; text-align: center; color: #0A7A54; font-size: 13px; font-weight: 600; background: var(--emerald-bg); }

  /* ---------- Toast ---------- */
  #toasts { position: fixed; z-index: 100; bottom: 22px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .toast {
    background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 12px;
    font-weight: 600; font-size: 13px; box-shadow: var(--shadow-lg);
    display: flex; align-items: center; gap: 9px; animation: toastIn .2s ease-out;
  }
  .toast .ti { width: 18px; height: 18px; color: #4FE0A6; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .demo-flag {
    display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700;
    color: var(--brand-d); background: var(--brand-050); padding: 4px 10px; border-radius: 999px;
    border: 1px solid var(--brand-100);
  }

  .board-btn {
    display: inline-flex; align-items: center; gap: 8px; padding: 9px 15px; border-radius: 12px;
    border: 1px solid var(--line); background: var(--panel); color: var(--ink); font-weight: 700; font-size: 13px;
    transition: background .13s, border-color .13s;
  }
  .board-btn:hover { background: #F0F5F4; border-color: var(--brand-100); }
  .board-btn svg { width: 17px; height: 17px; color: var(--brand); }

  /* ---------- Board overlay ---------- */
  .overlay {
    position: fixed; inset: 0; z-index: 80; background: rgba(14,32,39,.45);
    -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
    display: flex; align-items: flex-start; justify-content: center; padding: 44px 20px; overflow-y: auto;
    animation: ovIn .15s ease-out;
  }
  @keyframes ovIn { from { opacity: 0; } to { opacity: 1; } }
  .board {
    width: 100%; max-width: 960px; background: var(--paper); border-radius: 20px;
    box-shadow: var(--shadow-lg); overflow: hidden; animation: pop .18s ease-out;
  }
  .board-head { display: flex; align-items: center; gap: 12px; padding: 18px 24px; border-bottom: 1px solid var(--line2); }
  .board-head .bt { font-family: var(--serif); font-size: 21px; font-weight: 600; }
  .board-head .bsub { font-size: 12.5px; color: var(--ink3); }
  .board-close {
    margin-left: auto; width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--paper); color: var(--ink2); display: grid; place-items: center;
  }
  .board-close:hover { background: #F0F5F4; }
  .board-close svg { width: 18px; height: 18px; }

  .board-tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; padding: 20px 24px; }
  .btile { border-radius: 16px; padding: 18px; border: 1px solid var(--line); position: relative; overflow: hidden; }
  .btile .big { font-size: 40px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -1px; }
  .btile .bl { font-size: 13px; font-weight: 700; margin-top: 7px; }
  .btile .bd { font-size: 11.5px; color: var(--ink3); margin-top: 2px; }
  .btile.ok { background: var(--emerald-bg); border-color: #C4EAD8; }
  .btile.ok .big, .btile.ok .bl { color: #0A7A54; }
  .btile.no { background: var(--rose-bg); border-color: #F6CDD2; }
  .btile.no .big, .btile.no .bl { color: var(--rose); }
  .btile.rv { background: var(--brand-050); border-color: var(--brand-100); }
  .btile.rv .big, .btile.rv .bl { color: var(--brand-d); }

  .board-cols { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--line2); }
  .bcol { min-height: 0; }

  .bcol.no .bcol-head { color: var(--rose); } .bcol.no .cc { background: var(--rose-bg); color: var(--rose); }

  .brow {

  }

  .brow .bn { font-weight: 650; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .brow .bi { font-size: 11.5px; color: var(--ink3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .brow .bph { font-size: 11.5px; font-weight: 600; color: var(--ink2); flex: 0 0 auto; font-variant-numeric: tabular-nums; }

  .bcol-empty { padding: 26px 16px; text-align: center; color: var(--ink3); font-size: 12.5px; }

  @media (max-width: 720px) {
    .board-tiles { grid-template-columns: 1fr; }
    .board-cols { grid-template-columns: 1fr; }

  /* ---------- Hesap bağlama ekranı ---------- */
  .board.connect { max-width: 520px; }

  .conn-add { border: 1px dashed var(--line); border-radius: 16px; padding: 18px; background: var(--panel); }
  .ig-badge {
    display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13.5px; color: var(--ink);
    background: linear-gradient(135deg, #FCE8D8, #F7DCE9); padding: 8px 14px; border-radius: 11px; margin-bottom: 16px;
  }
  .ig-badge svg { width: 18px; height: 18px; color: #C6395A; }
  .cadd-lbl { display: block; font-size: 12px; font-weight: 600; color: var(--ink2); margin-bottom: 6px; }
  .cadd-row { display: flex; align-items: center; gap: 0; position: relative; }
  .cadd-row .at { position: absolute; left: 13px; color: var(--ink3); font-weight: 600; pointer-events: none; }
  .cadd-row input {
    flex: 1; padding: 11px 14px 11px 28px; border-radius: 11px 0 0 11px; border: 1px solid var(--line);
    border-right: none; background: var(--paper); outline: none;

  .cadd-row input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-050); z-index: 1; }
  .cadd-btn {
    padding: 11px 20px; border-radius: 0 11px 11px 0; border: none;

  }

  .cadd-note svg { width: 15px; height: 15px; flex: 0 0 auto; margin-top: 1px; color: var(--brand); }

  /* ============ HAREKET & PARLATMA ============ */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideDownTop { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: none; } }
  @keyframes railIn { from { opacity: 0; transform: translateX(-18px) scale(.75); } to { opacity: 1; transform: none; } }
  @keyframes bubbleIn { from { opacity: 0; transform: translateY(10px) scale(.95); } to { opacity: 1; transform: none; } }
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  @keyframes shimmer { 0% { background-position: -450px 0; } 100% { background-position: 450px 0; } }
  @keyframes glow { 0%,100% { box-shadow: 0 4px 12px rgba(12,138,148,.35); } 50% { box-shadow: 0 7px 24px rgba(12,138,148,.55); } }
  @keyframes badgePop { 0% { transform: scale(0); } 70% { transform: scale(1.28); } 100% { transform: scale(1); } }
  @keyframes overlayFade { from { opacity: 0; } to { opacity: 1; } }

  /* Açılış koreografisi (yalnızca ilk yüklemede) */
  body.booting .topbar { animation: slideDownTop .55s var(--ease-out) both; }
  body.booting .rail-item { animation: railIn .5s var(--ease-out) both; }
  body.booting .list-head { animation: fadeUp .5s var(--ease-out) both; animation-delay: .12s; }
  body.booting .convo { animation: fadeUp .5s var(--ease-out) both; }
  body.booting .pane.chat { animation: fadeIn .8s ease both; animation-delay: .18s; }
  body.booting .pane.contact { animation: fadeUp .6s var(--ease-out) both; animation-delay: .28s; }
  body.booting .stat { animation: fadeUp .5s var(--ease-out) both; }
  body.booting .stat:nth-child(2) { animation-delay: .06s; }
  body.booting .stat:nth-child(3) { animation-delay: .12s; }

  /* Seçim / görünüm girişi */
  .anim-in { animation: fadeUp .4s var(--ease-out) both; }
  .thread.anim-in { animation: fadeIn .5s ease both; }
  .msg-row.msg-new .bubble { animation: bubbleIn .42s var(--ease-spring) both; }

  /* Logo yumuşak parıltı */
  .logo { animation: glow 5s ease-in-out infinite; }

  /* Hover mikro-etkileşimleri */
  .convo { transition: background .14s, transform .14s var(--ease-out); }
  .convo:hover { transform: translateX(3px); }
  .convo-scroll { overflow-x: hidden; }
  .qbtn, .send, .cta-hot, .chip, .dq, .sbtn, .board-btn, .bell, .cadd-btn { transition: transform .12s var(--ease-out), background .14s, box-shadow .16s, border-color .14s, filter .14s; }
  .qbtn:active, .send:active, .cta-hot:active, .dq:active, .sbtn:active, .board-btn:active { transform: scale(.96); }
  .send:hover, .cta-hot:hover { transform: translateY(-1px); }
  .stat { transition: transform .16s var(--ease-out), box-shadow .16s; }
  .stat:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .btile { transition: transform .18s var(--ease-out), box-shadow .18s; }
  .btile:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
  .brow, .pop-item { transition: background .12s, transform .12s var(--ease-out); }
  .brow:hover { transform: translateX(3px); }
  .bcol-list { overflow-x: hidden; }
  .rail-item { transition: border-radius .16s var(--ease-out), background .16s, transform .12s var(--ease-out); }
  .rail-item:active { transform: scale(.9); }
  .rail-badge { animation: badgePop .4s var(--ease-spring) both; }
  .conn-row { transition: transform .14s var(--ease-out), box-shadow .16s; }
  .conn-row:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
  .overlay { animation: overlayFade .18s ease both; }
  .sum-card { transition: transform .14s var(--ease-out), box-shadow .16s, border-color .14s; }
  .sum-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--brand-100); }
  .sum-card:active { transform: scale(.97); }
  .sum-card.no .sc-dot { animation: dotPulse 1.4s ease-in-out infinite; }
  .sum-detail { transition: background .14s, border-color .14s, transform .12s; }
  .sum-detail:active { transform: scale(.96); }
  body.booting .summary { animation: fadeUp .5s var(--ease-out) both; animation-delay: .1s; }

  /* Dokulu sohbet zemini */

    background-color: #F4F8F8;

  /* yumuşak tema geçişi */
  body, .topbar, .summary, .pane, .rail, .sum-card, .tag, .bubble, .field input, .field select, .field textarea {

  /* ============ GECE MODU ============ */

  /* ============ MOBİL ============ */
  /* Mobil-özel gezinme düğmeleri (varsayılan gizli, mobilde görünür) */
  .chat-back, .contact-btn {
    display: none; width: 40px; height: 40px; border-radius: 11px; border: 1px solid var(--line);
    background: var(--paper); color: var(--ink2); align-items: center; justify-content: center; flex: 0 0 auto;
  }
  .chat-back svg, .contact-btn svg { width: 21px; height: 21px; }
  .chat-back:active, .contact-btn:active { background: var(--brand-050); }
  .contact-close {
    display: none; width: 100%; padding: 12px; margin-bottom: 14px; border-radius: 11px;
    border: 1px solid var(--line); background: var(--panel); color: var(--ink2); font-weight: 700; font-size: 14px;
    align-items: center; justify-content: center; gap: 8px;
  }

    .wordmark .sub { font-size: 10.5px; }
    .demo-flag { display: none; }
    .live-pill { padding: 7px 12px; }

    .summary { padding: 9px 14px; gap: 9px; }
    .sum-title, .sum-spacer, .sum-div { display: none; }
    .sum-card { padding: 8px 14px 8px 10px; }
    .sum-card .sc-n { font-size: 20px; }
    .dcard { padding: 8px 13px; gap: 9px; }
    .dcard .dn { font-size: 21px; }
    .dcard .dic { width: 30px; height: 30px; }
    .app-footer { font-size: 11.5px; padding: 6px; }

    .body { display: flex; flex-direction: column; }
    .rail {
      flex-direction: row; width: 100%; height: auto; padding: 9px 12px; gap: 10px;
      border-right: none; border-bottom: 1px solid var(--line); overflow-x: auto; overflow-y: hidden;
    }
    .rail-sep { width: 1px; height: 30px; margin: 0 2px; }
    .rail-item { width: 44px; height: 44px; }
    .rail-item.active::before { left: 50%; top: auto; bottom: -9px; transform: translateX(-50%); width: 24px; height: 3px; border-radius: 4px 4px 0 0; }
    .rail .tip { display: none; }

    .pane.list { flex: 1; border-right: none; min-height: 0; }
    .pane.chat { display: none; min-height: 0; }
    body.show-chat .pane.list { display: none; }
    body.show-chat .pane.chat { display: flex; flex: 1; }

    .pane.contact { display: none; }
    body.show-contact .pane.contact {
      display: flex; position: fixed; inset: 0; z-index: 70; width: auto; border-left: none;
      animation: fadeUp .26s var(--ease-out) both;
    }

    .chat-back, .contact-btn { display: inline-flex !important; }
    .contact-close { display: flex !important; }

    .bubble { max-width: 82%; }
    .quickbar { gap: 6px; }
    .overlay { padding: 16px 12px; }
    .board-tiles { grid-template-columns: 1fr; }
    .board-cols { grid-template-columns: 1fr; }
    .bcol + .bcol { border-left: none; border-top: 1px solid var(--line2); }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  @media (max-width: 1080px) {
    .body { grid-template-columns: 68px 300px 1fr; }
    .pane.contact { display: none; }
    .stats { display: none; }

  /* ==================================================================
     v3 TASARIM YÜKSELTMESİ — altın vurgu · derinlik · hareket · mobil
     ================================================================== */
  :root{ --gold:#C8912F; --gold-d:#A9782C; --gold-hi:#E8B84E; --gold-bg:#FBF3E1; }
  [data-theme="dark"]{ --gold:#E8B84E; --gold-d:#D8A94E; --gold-hi:#F0CE86; --gold-bg:#2A2413; }

  /* Logo parıltısı artık altın (teal glow yerine) */
  @keyframes glowGold{0%,100%{filter:drop-shadow(0 3px 8px rgba(200,145,47,.38))}50%{filter:drop-shadow(0 6px 18px rgba(232,184,78,.68))}}
  .logo{ animation:none !important; background:none !important; box-shadow:none !important; }
  .logo img{ animation:glowGold 5s ease-in-out infinite; }

  /* Cam efektli, sabit üst bar + ince altın çizgi */
  .topbar{
    position:sticky; top:0; z-index:60;
    -webkit-backdrop-filter:saturate(1.35) blur(12px); backdrop-filter:saturate(1.35) blur(12px);
    background:color-mix(in srgb, var(--paper) 80%, transparent);
    box-shadow: 0 1.5px 0 color-mix(in srgb, var(--gold) 42%, transparent), 0 6px 18px -12px rgba(0,0,0,.35);
  }

  /* Odak halkası altın (erişilebilir + markaya uygun) */
  :focus-visible{ outline:2px solid var(--gold) !important; outline-offset:2px; }

  /* GELEN DM kartları: derinlik + hover'da ışık süzülmesi + kalkış */
  .dcard{ position:relative; overflow:hidden; border-radius:16px;
    transition:transform .2s var(--ease-out), box-shadow .2s var(--ease-out); }
  .dcard::after{ content:""; position:absolute; top:0; left:-150%; width:60%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.30),transparent); transform:skewX(-18deg); pointer-events:none; }

  // ---------- Sesli mesaj: kaydet + gönder ----------
  var _rec = { mr:null, chunks:[], stream:null };
  function toggleVoiceRecord(l, btn){
    if (_rec.mr && _rec.mr.state === "recording"){ _rec.mr.stop(); return; }
    if (!navigator.mediaDevices || !window.MediaRecorder){ toast("Tarayıcı ses kaydını desteklemiyor"); return; }
    navigator.mediaDevices.getUserMedia({ audio:true }).then(function(stream){
      _rec.stream = stream; _rec.chunks = [];
      var mime = (window.MediaRecorder && MediaRecorder.isTypeSupported("audio/mp4")) ? "audio/mp4"
               : (MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "");
      var mr = new MediaRecorder(stream, mime ? { mimeType:mime } : undefined); _rec.mr = mr;
      mr.ondataavailable = function(e){ if (e.data && e.data.size) _rec.chunks.push(e.data); };
      mr.onstop = function(){
        try { _rec.stream.getTracks().forEach(function(t){ t.stop(); }); } catch(e){}
        btn.classList.remove("recording"); btn.textContent = "🎤 Ses";
        var type = (mr.mimeType || mime || "audio/webm").split(";")[0];
        var blob = new Blob(_rec.chunks, { type: type });
        if (blob.size < 800){ toast("Kayıt çok kısa"); return; }
        sendVoice(l, blob, type);
      };
      mr.start(); btn.classList.add("recording"); btn.textContent = "⏹ Durdur";
      toast("Kayıt başladı… bitince tekrar bas 🎤");
    }).catch(function(){ toast("Mikrofon izni gerekli"); });
  }
  function sendVoice(l, blob, mime){
    var ext = mime.indexOf("mp4")>=0 ? "m4a" : (mime.indexOf("webm")>=0 ? "webm" : "ogg");
    var file = new File([blob], "v"+Date.now()+"."+ext, { type:mime });
    toast("Ses yükleniyor…");
    galUpload(file).then(function(name){
      var url = galPublicUrl(name);
      l.messages.push({ from:"out", text:"", att:url, attType:"audio", time:new Date().toISOString(), pending:true });
      l.lastText = "🎤 Sesli mesaj"; l.lastTime = new Date().toISOString(); l.lastDir = "out";
      renderChat(); renderList();
      return fetch(LIVE_CFG.url+"/rest/v1/ig_messages",{ method:"POST", headers:sbH(), body:JSON.stringify({ ig_user_id:l.id, direction:"out", attachment_url:url, attachment_type:"audio" }) });
    }).then(function(r){
      if (r && !r.ok){ r.text().then(function(t){ toast("Gönderilemedi: "+(t||"").slice(0,50)); }); return; }
      sbPatch("ig_conversations?ig_user_id=eq."+encodeURIComponent(l.id),{ last_message:"🎤 Sesli mesaj", last_time:new Date().toISOString(), last_dir:"out" });
      toast("Sesli mesaj gönderiliyor… 🎤"); setTimeout(function(){ liveMessages(l.id); }, 1800);
    }).catch(function(e){ toast("Hata: "+((e&&e.message)||"").slice(0,50)); });
  }

  var _composeDraft = {};
  function doSend() {
    var ta = document.getElementById("composerText");
    var t = ta.value.trim();
    if (!t) return;
    var l = byId(state.selectedId); if (!l) return;
    ta.value=""; ta.style.height="auto"; _composeDraft[l.id]="";
    l.messages.push({from:"out", text:t, time:new Date().toISOString(), pending: LIVE ? true : false}); l.lastText=t; l.lastTime=new Date().toISOString(); l.lastDir="out";
    renderChat(); renderList(); renderTop();
    var rows = document.querySelectorAll("#thread .msg-row");
    if (rows.length) rows[rows.length-1].classList.add("msg-new");
    if (LIVE) {
      // Mesajı REST ile veritabanına yaz (kalıcı) → teslimi sunucu (deliver) yapar
      fetch(LIVE_CFG.url + "/rest/v1/ig_messages", { method: "POST", headers: sbH(), body: JSON.stringify({ ig_user_id: l.id, direction: "out", text: t }) })
        .then(function(r){
          if (!r.ok) { r.text().then(function(b){ toast("Kaydedilemedi " + r.status + ": " + (b||"").slice(0,80)); }); return; }
          sbPatch("ig_conversations?ig_user_id=eq." + encodeURIComponent(l.id), { last_message: t, last_time: new Date().toISOString(), last_dir: "out" });
          // teslim: DB tetikleyicisi (trg_deliver) otomatik yapar — panelden ayrıca çağırmıyoruz (çift gönderim önlemi)
          toast("Gönderiliyor…");
          setTimeout(function(){ liveMessages(l.id); }, 1500);
        })
        .catch(function(){ toast("Bağlantı hatası"); });
    } else {
      toast("Yanıt gönderildi (demo)");
    }
  }

  // ---------- Analitik ----------
  var anEl = null;
  function closeAnalytics(){ if (anEl){ anEl.remove(); anEl=null; } }
  function bars(items, max, colorFn){
    return '<div class="an-bars">' + items.map(function(it){
      var pct = Math.round((it.n/max)*100);
      return '<div class="an-row"><span class="an-lab">'+esc(it.label)+'</span>'+

        '<span class="an-n">'+it.n+'</span></div>';
    }).join("") + '</div>';
  }
  var TOPIC_KW = [
    ["Fiyat / ücret", ["fiyat","ücret","ucret","ne kadar","kaç para","kac para"," tl","₺","taksit","ödeme","odeme"]],
    ["Randevu", ["randevu","müsait","musait","hangi gün","kaçta","ne zaman gel"]],
    ["Adres / konum", ["adres","konum","nerede","neredesiniz","yol tarifi"]],
    ["İmplant", ["implant"]],
    ["Gülüş tasarımı / estetik", ["gülüş","gulus","estetik","zirkonyum","lamina","kaplama","porselen"]],
    ["Diş teli / ortodonti", ["diş teli","dis teli"," tel ","ortodonti","şeffaf plak","invisalign","plak"]],
    ["Beyazlatma", ["beyazlat","bleaching"]],
    ["Dolgu / kanal / çekim / ağrı", ["dolgu","kanal","çekim","cekim","ağrı","agri","apse","20 yaş"]],
    ["Sigorta / anlaşma", ["sigorta","anlaşmalı","anlasmali","sgk","özel sağlık"]]
  ];
  var ASK_KW = ["numara","numaran","telefon","telefonu","arayalım","arayalim","arayabil","paylaşır","paylasir","ulaşalım","ulasalim","geri dön","sizi aray"];
  function analyzeMessages(){
    function fill(msgs){
      var byConv = {};
      msgs.forEach(function(m){ (byConv[m.ig_user_id]=byConv[m.ig_user_id]||[]).push(m); });
      var topics = TOPIC_KW.map(function(t){ return { label:t[0], n:0 }; });
      msgs.forEach(function(m){ if(m.direction!=="in"||!m.text) return; var low=String(m.text).toLowerCase(); TOPIC_KW.forEach(function(t,i){ for(var k=0;k<t[1].length;k++){ if(low.indexOf(t[1][k])>=0){ topics[i].n++; break; } } }); });
      topics = topics.filter(function(x){ return x.n>0; }).sort(function(a,b){ return b.n-a.n; });
      var maxT = Math.max.apply(null,[1].concat(topics.map(function(x){ return x.n; })));
      var elT = document.getElementById("anTopics");
      if(elT) elT.innerHTML = topics.length ? bars(topics, maxT, function(){ return "#0C8A94"; }) : '<div class="an-empty">Yeterli mesaj verisi yok</div>';
      var total=0, phone=0, askedTotal=0, askedPhone=0, notAskedTotal=0, notAskedPhone=0;
      Object.keys(byConv).forEach(function(id){
        var arr=byConv[id]; if(!arr.some(function(m){ return m.direction==="in"; })) return;
        total++;
        var gave = arr.some(function(m){ return m.direction==="in" && detectPhone(m.text); });
        var asked = arr.some(function(m){ return m.direction==="out" && m.text && ASK_KW.some(function(k){ return String(m.text).toLowerCase().indexOf(k)>=0; }); });
        if(gave) phone++;
        if(asked){ askedTotal++; if(gave) askedPhone++; } else { notAskedTotal++; if(gave) notAskedPhone++; }
      });
      var rate = total? Math.round(phone/total*100):0;
      var rA = askedTotal? Math.round(askedPhone/askedTotal*100):0;
      var rN = notAskedTotal? Math.round(notAskedPhone/notAskedTotal*100):0;
      var insight = (askedTotal && notAskedTotal)
        ? ('Numara <b>istediğiniz</b> konuşmalarda telefon oranı <b>%'+rA+'</b>, istemediklerinizde <b>%'+rN+'</b>. '+(rA>=rN?'→ Numara istemek işe yarıyor; her sıcak sohbette açıkça isteyin.':'→ Farklı bir açılış deneyin.'))
        : 'Veri biriktikçe hangi yaklaşımın daha çok telefon getirdiğini burada göstereceğim.';
      var elP = document.getElementById("anPhone");
      if(elP) elP.innerHTML = '<div class="an-tiles" style="margin:0 0 10px"><div class="an-tile"><div class="at-n">'+total+'</div><div class="at-l">Konuşma</div></div><div class="an-tile ok"><div class="at-n">'+phone+'</div><div class="at-l">Telefon veren</div></div><div class="an-tile rv"><div class="at-n">%'+rate+'</div><div class="at-l">Dönüşüm</div></div></div><div class="an-note">'+insight+'</div>';

      // ---- en yoğun saat / gün (gelen DM) ----
      var hourC={}, dayC={}, DAYN=["Paz","Pzt","Sal","Çar","Per","Cum","Cmt"];
      msgs.forEach(function(m){ if(m.direction!=="in"||!m.t) return; var dt=new Date(m.t); if(isNaN(dt.getTime())) return; hourC[dt.getHours()]=(hourC[dt.getHours()]||0)+1; dayC[dt.getDay()]=(dayC[dt.getDay()]||0)+1; });
      var hoursArr=[]; for(var hh=0;hh<24;hh++){ if(hourC[hh]) hoursArr.push({label:(hh<10?"0"+hh:hh)+":00", n:hourC[hh], h:hh}); }
      var topHours=hoursArr.slice().sort(function(a,b){return b.n-a.n;}).slice(0,5).sort(function(a,b){return a.h-b.h;});
      var maxH=Math.max.apply(null,[1].concat(topHours.map(function(x){return x.n;})));
      var elH=document.getElementById("anHours");
      if(elH) elH.innerHTML = topHours.length ? bars(topHours.map(function(x){return {label:x.label,n:x.n};}), maxH, function(){return "#12A0AB";}) : '<div class="an-empty">Yeterli veri yok</div>';
      var dOrder=[1,2,3,4,5,6,0], daysOrdered=dOrder.map(function(i){return {label:DAYN[i], n:dayC[i]||0};});
      var maxD=Math.max.apply(null,[1].concat(daysOrdered.map(function(x){return x.n;})));
      var elD=document.getElementById("anDays");
      if(elD) elD.innerHTML = daysOrdered.some(function(x){return x.n>0;}) ? bars(daysOrdered, maxD, function(){return "#7A67E6";}) : '<div class="an-empty">Yeterli veri yok</div>';

      // ---- ortalama yanıt süresi (gelen → hemen ardından bizim giden) ----
      var byC2={}; msgs.forEach(function(m){ (byC2[m.ig_user_id]=byC2[m.ig_user_id]||[]).push(m); });
      var diffs=[];
      Object.keys(byC2).forEach(function(id){
        var arr=byC2[id];
        for(var i=0;i<arr.length-1;i++){
          if(arr[i].direction==="in" && arr[i+1].direction==="out" && arr[i].t && arr[i+1].t){
            var d0=new Date(arr[i].t), d1=new Date(arr[i+1].t);
            if(isNaN(d0.getTime())||isNaN(d1.getTime())) continue;
            var mins=(d1-d0)/60000;
            if(mins>=0 && mins<=1440) diffs.push(mins);
          }
        }
      });
      var elR=document.getElementById("anResp");
      if(elR){
        if(diffs.length){
          diffs.sort(function(a,b){return a-b;});
          var med=diffs[Math.floor(diffs.length/2)], avg=diffs.reduce(function(a,b){return a+b;},0)/diffs.length;
          var fm=function(x){ return x<60 ? (Math.round(x)+" dk") : ((Math.round(x/6)/10)+" saat"); };

    ov.addEventListener("click", function(e){ if(e.target===ov) closeGallery(); });
    function refresh(){
      galList().then(function(items){
        if(!Array.isArray(items)) items=[];
        items = items.filter(function(it){ return it && it.name && it.id; });
        var grid=document.getElementById("galGrid"); if(!grid) return;
        grid.innerHTML = items.length ? items.map(function(it){
          var url=galPublicUrl(it.name), pdf=/\.pdf$/i.test(it.name);
          var thumb = pdf ? '<div class="gal-pdf">PDF</div>' : '<img src="'+esc(url)+'" alt="">';
          return '<div class="gal-item">'+thumb+'<div class="gal-acts"><button class="gal-send" data-name="'+esc(it.name)+'" data-pdf="'+(pdf?1:0)+'">Gönder</button><button class="gal-del" data-name="'+esc(it.name)+'" title="Sil">✕</button></div></div>';
        }).join("") : '<div class="an-empty">Henüz dosya yok. Yukarıdan JPG/PDF yükleyin.</div>';
        grid.querySelectorAll(".gal-send").forEach(function(b){ b.addEventListener("click", function(){ galSend(l, b.getAttribute("data-name"), b.getAttribute("data-pdf")==="1"); closeGallery(); }); });
        grid.querySelectorAll(".gal-del").forEach(function(b){ b.addEventListener("click", function(){ b.disabled=true; galDelete(b.getAttribute("data-name")).then(refresh); }); });
      }).catch(function(){ var g=document.getElementById("galGrid"); if(g) g.innerHTML='<div class="an-empty">Galeri yüklenemedi</div>'; });
    }
    refresh();
    document.getElementById("galFile").addEventListener("change", function(e){
      var files=Array.prototype.slice.call(e.target.files||[]); if(!files.length) return;
      var g=document.getElementById("galGrid"); if(g) g.innerHTML='<div class="an-load">Yükleniyor…</div>';
      Promise.all(files.map(function(f){ return galUpload(f).catch(function(){ return null; }); })).then(function(res){
        var ok=res.filter(Boolean).length; toast(ok+" dosya yüklendi"); refresh();
      });
    });
  }
