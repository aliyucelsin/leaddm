      + '<div style="margin:12px 0;padding:11px 13px;background:#1B1B27;border:1px solid #2A2836;border-radius:11px;color:#f0e9d2">Merhaba! 🦷 Kliniğimize hoş geldiniz. Size nasıl yardımcı olabiliriz? Aklınızdaki tedaviyi yazmanız yeterli. 😊</div>'
      + '<p style="color:#8a8577;font-size:12.5px">Açık/kapalı yapılabilir, metni istediğiniz gibi düzenlenir.</p>');
    else if (kind === "autoreply") demoModal("💬 Anahtar Kelime Yanıtı",
      '<p>Belirli kelimeler geçtiğinde otomatik, profesyonel yanıt gönderilir ve numara istenir.</p>'
      + '<div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">'
      + demoRule("ağrı, acil", "Diş ağrısını ciddiye alıyoruz… Numaranızı bırakın, uzman hekimimiz en kısa sürede arasın.")
      + demoRule("implant", "İmplant, eksik dişin en kalıcı çözümüdür… Numaranızı bırakın, hekimimiz planı anlatsın.")
      + demoRule("fiyat, ne kadar", "Ücret kişiye özel planlanır; ilk muayene ücretsiz. Numaranızı bırakın, hekimimiz net bilgi versin.")
      + '</div><p style="color:#8a8577;font-size:12.5px;margin-top:12px">Canlı hesapta 24 hazır kural mevcut; yenisini ekleyebilir, silebilirsiniz.</p>');
    else if (kind === "hours") demoModal("🕐 Mesai Dışı Mesajı",
      '<p>Çalışma saatleri dışında gelen mesajlara otomatik dönüş yapılır — hasta boşta kalmaz.</p>'
      + '<div style="margin:12px 0;padding:10px 12px;background:#1B1B27;border:1px solid #2A2836;border-radius:11px;color:#f0e9d2;font-size:12.5px">🗓 Pzt–Cmt · 09:00–19:00</div>'
      + '<div style="padding:11px 13px;background:#1B1B27;border:1px solid #2A2836;border-radius:11px;color:#f0e9d2">Şu an mesai dışındayız 🌙 Mesajınızı aldık; en kısa sürede size dönüş sağlayacağız. Dilerseniz numaranızı bırakın. 😊</div>');
    else if (kind === "pass") demoModal("🔑 Şifre Değiştir",
      '<p>Panel giriş şifrenizi buradan güncellersiniz.</p>'
      + '<p style="color:#8a8577;font-size:12.5px;margin-top:8px">Panel herkese açık bir web adresinde çalıştığı için şifrenizi güçlü tutmanız önemlidir. Demo modunda şifre değişikliği devre dışıdır.</p>');
  }
  function demoRule(kw, rp){
    return '<div style="background:#1B1B27;border:1px solid #2A2836;border-radius:10px;padding:10px 12px">'
      + '<div style="font-size:11px;color:#d8a94e;font-weight:700;letter-spacing:.03em;margin-bottom:4px">'+kw+'</div>'
      + '<div style="color:#c9c3b4;font-size:12.5px;line-height:1.5">'+rp+'</div></div>';
  }
  function showDemoBanner(){
    if (document.getElementById("demoBanner")) return;
    var b = document.createElement("div"); b.id = "demoBanner";
    b.style.cssText = "position:fixed;left:50%;transform:translateX(-50%);top:9px;z-index:99998;display:flex;align-items:center;gap:11px;padding:7px 9px 7px 14px;border-radius:999px;background:rgba(21,21,31,.92);border:1px solid rgba(216,169,78,.45);box-shadow:0 8px 24px -8px rgba(0,0,0,.7);backdrop-filter:blur(6px);font-size:12.5px;color:#f0e9d2;max-width:calc(100vw - 24px)";
    b.innerHTML = '<span style="white-space:nowrap">🎬 <b style="color:#d8a94e">DEMO</b> · örnek hesap</span>'
      + '<button id="demoTourBtn" style="border:0;background:#23222e;color:#e8dcc0;padding:5px 10px;border-radius:999px;cursor:pointer;font-size:11.5px;white-space:nowrap">Tur</button>'
      + '<button id="demoExitBtn" style="border:0;background:linear-gradient(135deg,#f5d67b,#d4af37 60%,#b8860b);color:#100d05;font-weight:700;padding:5px 12px;border-radius:999px;cursor:pointer;font-size:11.5px;white-space:nowrap">Girişe dön</button>';
    document.body.appendChild(b);
    document.getElementById("demoExitBtn").addEventListener("click", exitDemo);
    document.getElementById("demoTourBtn").addEventListener("click", demoTour);
  }
  function demoTour(){
    demoModal("🎬 LeadDm Demo Turu",
      '<p style="margin-bottom:12px">Bu demo hesabı örnek verilerle dolu — canlı hesabınızdan tamamen bağımsız. Şunları deneyin:</p>'
      + '<div style="display:flex;flex-direction:column;gap:10px">'
      + demoStep("💬","Sohbet listesi","Farklı durumlardaki hastalar burada. Bir sohbete tıklayın — sağda mesajlar ve hasta kartı açılır.")
      + demoStep("🎨","Durum renkleri","Yeni · Bilgi bekleniyor · İletişim alındı · Randevu · Dönüş yok — her biri renkli etiketle işaretli.")
      + demoStep("📊","Üst kartlar & Araçlar (☰)","Gelen DM sayaçlarına ve ☰ menüsündeki Analitik, Kanban, Takvim, otomasyon ayarlarına göz atın.")
      + demoStep("✍️","Mesaj gönderme","Bir sohbette mesaj yazıp gönderin — demoda anında görünür (canlıda Instagram\'a gider).")
      + demoStep("🚪","Girişe dön","Üstteki \'Girişe dön\' ile çıkıp gerçek hesabınıza giriş yapabilirsiniz.")
      + '</div>');
  }
  function demoStep(em, t, d){
    return '<div style="display:flex;gap:11px;align-items:flex-start">'
      + '<div style="font-size:17px;flex:0 0 auto;width:26px;text-align:center">'+em+'</div>'
      + '<div><b style="color:#f0e9d2;font-size:13.5px">'+t+'</b><div style="color:#8a8577;font-size:12.5px;line-height:1.5;margin-top:2px">'+d+'</div></div></div>';
  }

  // ---------- Mobil alt navigasyon ----------
  function buildMobileNav(){
    if (document.getElementById("mnav")) return;
    var nav = document.createElement("nav"); nav.id = "mnav"; nav.setAttribute("aria-label","Hızlı gezinme");
    var items = [
      { key:"list",  ic:"💬", label:"Sohbetler" },
      { key:"call",  ic:"📞", label:"Aranacaklar" },
      { key:"stats", ic:"📊", label:"Analitik" },
      { key:"tools", ic:"☰",  label:"Araçlar" }
    ];
    nav.innerHTML = items.map(function(it){
      return '<button type="button" data-mn="'+it.key+'"><span class="mic">'+it.ic+'</span><span>'+it.label+'</span>'
        + (it.key==="list" ? '<span class="mbadge" id="mnavBadge"></span>' : '') + '</button>';
    }).join("");
    document.body.appendChild(nav);
    function setActive(k){ nav.querySelectorAll("button").forEach(function(b){ b.classList.toggle("active", b.getAttribute("data-mn")===k); }); }
    setActive("list");
    function openToolsSheet(anchor){
      // Araçlar menüsünü aç ve mobilde alt navigasyonun HEMEN ÜSTÜNE konumla (parmağa yakın)
      openDrop(anchor, getToolsItems());
      if (dropEl){
        var mh = dropEl.offsetHeight, mw = dropEl.offsetWidth;
        var rr = anchor.getBoundingClientRect();
        dropEl.style.top = Math.max(8, rr.top - mh - 10) + "px";
        var left = rr.left + rr.width/2 - mw/2;
        dropEl.style.left = Math.max(8, Math.min(left, window.innerWidth - mw - 8)) + "px";
      }
    }
    nav.addEventListener("click", function(e){
      var b = e.target.closest("[data-mn]"); if(!b) return;
      e.stopPropagation();                          // menüyü açar açmaz kapatan belge tıklamasını engelle
      if (typeof closeDrop === "function") closeDrop();
      var k = b.getAttribute("data-mn");
      if (k==="list"){ document.body.classList.remove("show-chat","show-contact"); setActive("list"); try{ window.scrollTo({top:0,behavior:"smooth"}); }catch(_){}}
      else if (k==="call"){ if(typeof openToCall==="function") openToCall(); setActive("call"); }
      else if (k==="stats"){ if(typeof openAnalytics==="function") openAnalytics(); setActive("stats"); }
      else if (k==="tools"){ openToolsSheet(b); setActive("tools"); }
    });
    function refreshBadge(){
      try{ var el=document.getElementById("mnavBadge"); if(!el) return;
        var n=(typeof unreadCount==="function")?unreadCount():0;
        if(n>0){ el.textContent=n; el.style.display="inline-flex"; } else { el.style.display="none"; }
      }catch(_){ }
    }
    refreshBadge();
    if(!window._mnavT) window._mnavT = setInterval(refreshBadge, 3000);
  }

  function sbAuthBoot(){
    if (SESSION && SESSION.expires_at && (SESSION.expires_at - Date.now() > 60000)) { liveBoot(); }
    else if (SESSION && SESSION.refresh_token) { sbRefresh().then(function(ok){ if (ok) liveBoot(); else showLogin(); }); }
    else { showLogin(); }
  }
  function sbGet(p){ return fetch(LIVE_CFG.url + "/rest/v1/" + p, { headers: sbH() }).then(function(r){ return r.json(); }); }
  function sbPatch(p, body){ return fetch(LIVE_CFG.url + "/rest/v1/" + p, { method: "PATCH", headers: Object.assign(sbH(), { Prefer: "return=minimal" }), body: JSON.stringify(body) }); }
  function liveRowToLead(r){
    return { id: r.ig_user_id, igUserId: r.ig_user_id, accountId: r.account_id || null,
      username: r.username || "", ad: r.ad || "", soyad: r.soyad || "", telefon: r.telefon || "",
      islem: r.islem || "", kaynak: r.kaynak || "Instagram DM", durum: r.durum || "yeni",
      takip: r.sonraki_takip || "", not: r["not"] || "", tags: Array.isArray(r.tags) ? r.tags : [],
      temsilci: r.temsilci || null, randevuTarih: r.randevu_tarih || "", lid: r.lid || "",
      fiyatSordu: !!r.fiyat_sordu, waSent: !!r.wa_sent, read: r.read === false ? false : true,
      dogum: r.dogum || "", gecmis: r.gecmis || "", olusturma: r.created_at || null,
      lastText: r.last_message || "", lastTime: r.last_time || null, lastDir: r.last_dir || null, pic: r.pic_url || "", kvkkOnay: !!r.kvkk_onay, kvkkTarih: r.kvkk_tarih || "",
      files: Array.isArray(r.files) ? r.files : [], nurture: {}, messages: [] };
  }
  function persistLead(l){
    if(!LIVE || !l) return;
    var row = { ad: l.ad || null, soyad: l.soyad || null, telefon: l.telefon || null, islem: l.islem || null,
      durum: l.durum, sonraki_takip: l.takip || null, "not": l.not || null,
      tags: l.tags || [], temsilci: l.temsilci || null, randevu_tarih: l.randevuTarih || null,
      fiyat_sordu: !!l.fiyatSordu, wa_sent: !!l.waSent, dogum: l.dogum || null, gecmis: l.gecmis || null,
      kvkk_onay: !!l.kvkkOnay, kvkk_tarih: l.kvkkTarih || null };
    sbPatch("ig_conversations?ig_user_id=eq." + encodeURIComponent(l.id), row).catch(function(e){ console.error("persist", e); });
  }
  // ---- Yeni DM bildirimi (ses + masaüstü + sekme başlığı) ----
  var _convSeen = null;
  function _ts(t){ return t ? new Date(t).getTime() : 0; }
  function beep(){
    try {
      var Ac = window.AudioContext || window.webkitAudioContext; if (!Ac) return;
      var ctx = beep._c || (beep._c = new Ac());
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination); o.type = "sine"; o.frequency.value = 880;
      g.gain.setValueAtTime(0.0015, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.16, ctx.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.35);
      o.start(); o.stop(ctx.currentTime + 0.37);
    } catch (e) {}
  }
  function notifyIncoming(rows){
    var map = {}; rows.forEach(function(r){ map[r.ig_user_id] = _ts(r.last_time); });
    if (_convSeen === null) { _convSeen = map; return; } // ilk yükleme: sadece taban al, bildirme
    var yeni = [];
    rows.forEach(function(r){ if (r.last_dir === "in" && _ts(r.last_time) > (_convSeen[r.ig_user_id] || 0)) yeni.push(r); });
    _convSeen = map;
    if (!yeni.length) return;
    beep();
    var r0 = yeni[0], who = r0.username ? ("@" + r0.username) : "Yeni kişi";
    var body = yeni.length > 1 ? (yeni.length + " yeni DM geldi") : (r0.last_message || "Yeni mesaj");
    try { if (window.Notification && Notification.permission === "granted") new Notification("LeadDm • " + who, { body: body }); } catch (e) {}
    document.title = "🔴 (" + yeni.length + ") Yeni DM • LeadDm";
    setTimeout(function(){ document.title = "LeadDm"; }, 6000);
    toast(who + " yeni mesaj gönderdi ✉");
  }
  // ---- Telefon algılama → otomatik "İletişim Alındı" ----
  function detectPhone(t){
    if(!t) return null;
    var m = String(t).match(/(\+?\d[\d\s\-()]{8,}\d)/g);
    if(!m) return null;
    for(var i=0;i<m.length;i++){ var d=m[i].replace(/\D/g,""); if(d.length>=10 && d.length<=13) return d; }
    return null;
  }
  function autoPromotePhone(l){
    if(!l || l.telefon) return;                        // telefon zaten varsa dokunma
    if(l.durum!=="yeni" && l.durum!=="bilgiBekleniyor") return; // elle işlenmişse dokunma
    var ph = null;
    (l.messages||[]).forEach(function(m){ if(!ph && m.from==="in") ph = detectPhone(m.text); });
    if(!ph && l.lastDir==="in") ph = detectPhone(l.lastText);
    if(ph){
      l.telefon = ph; l.durum = "cevapVerdi"; persistLead(l);
      if(state.selectedId===l.id){ renderContact(); toast("Telefon algılandı → İletişim Alındı ✓"); }
    }
  }
  // Gelen DM sayaci (bugun/hafta/ay) — ig_messages'ten count
  function dmCount(sinceISO){
    return fetch(LIVE_CFG.url+"/rest/v1/ig_messages?select=id&direction=eq.in&created_at=gte."+encodeURIComponent(sinceISO), { headers: Object.assign(sbH(), { Prefer:"count=exact", Range:"0-0" }) })
      .then(function(r){ var cr=r.headers.get("content-range")||""; var t=cr.split("/")[1]; return parseInt(t,10)||0; });
  }
  function loadDmStats(){
    if(!LIVE) return;
    var now=new Date();
    var t0=new Date(now.getFullYear(),now.getMonth(),now.getDate()).toISOString();
    var w0=new Date(now.getTime()-7*86400000).toISOString();
    var m0=new Date(now.getTime()-30*86400000).toISOString();
    Promise.all([dmCount(t0),dmCount(w0),dmCount(m0)]).then(function(r){ window._dmStats={today:r[0],week:r[1],month:r[2]}; renderTop(); }).catch(function(){});
  }
  function liveLoad(){
    if(!LIVE) return;
    loadDmStats();
    sbGet("ig_conversations?select=*&order=last_time.desc.nullslast").then(function(rows){
      if(!Array.isArray(rows)) return;
      notifyIncoming(rows);
      var keep = {}; leads.forEach(function(l){ keep[l.id] = l.messages; });
      leads = rows.map(function(r){ var l = liveRowToLead(r); l.messages = keep[l.id] || []; return l; });
      leads.forEach(autoPromotePhone);
      if((!state.selectedId || !byId(state.selectedId)) && leads.length){ state.selectedId = leads[0].id; liveMessages(state.selectedId); }
      renderTop(); renderList(); renderChat(); renderContact();
    }).catch(function(e){ console.error("liveLoad", e); });
  }
  function liveMessages(id){
    if(!LIVE || !id) return;
    sbGet("ig_messages?select=*&ig_user_id=eq." + encodeURIComponent(id) + "&order=created_at.asc").then(function(rows){
      var l = byId(id); if(!l) return;
      var dbMsgs = (rows || []).map(function(m){ return { from: m.direction === "out" ? "out" : "in", text: m.text, time: m.created_at, att: m.attachment_url || "", attType: m.attachment_type || "" }; });
      // Veritabanında henüz olmayan (gönderim yolda/başarısız) yerel giden mesajları koru → kaybolmasın
      var seen = {}; dbMsgs.forEach(function(m){ seen[m.from + "|" + m.text] = 1; });
      var pend = (l.messages || []).filter(function(m){ return m.pending && !seen[m.from + "|" + m.text]; });
      l.messages = dbMsgs.concat(pend);
      autoPromotePhone(l);
      if(state.selectedId === id) { markSeen(id); renderChat(); } // açık sohbet: gelen mesaj okundu sayılır
      renderList();
    }).catch(function(e){ console.error("liveMessages", e); });
  }

  // ---------- İlk çizim ----------
  if (LIVE) {
    // Canlı: demo verisini temizle, gerçek hesabı ray'a koy, Supabase'den yükle + her 8sn yenile
    leads = []; state.selectedId = null;
    if (LIVE_CFG.account) accounts = [LIVE_CFG.account];
    // acctLabel artık sabit "Developer Ali Yücelsin" bağlantısı — üzerine yazma
    renderRail(); renderTop(); renderList(); renderChat(); renderContact();
    sbAuthBoot();
  } else {
    var _sel0 = byId(state.selectedId); if (_sel0) _sel0.read = true; // açık olan okundu
    if (!REDUCED) document.body.classList.add("booting");
    renderRail(); updateAcctLabel(); renderTop(); renderList(); renderChat(true); renderContact(true);
    setTimeout(function(){ document.body.classList.remove("booting"); }, 1350);
  }
  buildMobileNav();
})();
</script>
</body></html>
